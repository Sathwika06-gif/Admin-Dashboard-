<h2>Analytics</h2>

<div class="analytics-summary">

  <div class="analytics-card">
    <h4>Total Users</h4>
    <h2>{{summary?.totalUsers}}</h2>
  </div>

  <div class="analytics-card">
    <h4>Active Users</h4>
    <h2>{{summary?.activeUsers}}</h2>
  </div>

  <div class="analytics-card">
    <h4>Revenue</h4>
    <h2>{{summary?.revenue}}</h2>
  </div>

</div>

<div class="chart-container">
  <canvas id="chart"></canvas>
</div>
