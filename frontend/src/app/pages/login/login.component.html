<div class="login-container">

  <div class="login-box">
    <h2>Admin Login</h2>

    <input [(ngModel)]="form.email" placeholder="Email">

    <input [(ngModel)]="form.password" type="password" placeholder="Password">

    <button (click)="login()">Login</button>

    <p>Use admin@gmail.com / admin123</p>
  </div>

</div>
